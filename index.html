<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>米米童著 ｜ LINE 發送控制台</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0d0e;
    --surface: #1a1618;
    --surface2: #231e21;
    --border: #322830;
    --gold: #c9847a;
    --gold-light: #e8afa8;
    --gold-dim: #7a4a45;
    --text: #f0e8e8;
    --text-muted: #997;
    --text-dim: #664;
    --green: #4caf82;
    --green-bg: #0d2018;
    --red: #e05c5c;
    --red-bg: #1f0d0d;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans TC', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  .logo-text {
    font-size: 15px;
    font-weight: 700;
    color: var(--gold-light);
    letter-spacing: 0.5px;
  }
  .logo-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .settings-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .settings-btn:hover { border-color: var(--gold-dim); color: var(--gold-light); }

  /* ── Settings Panel ── */
  .settings-panel {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: none;
    gap: 16px;
    flex-wrap: wrap;
    width: 100%;
    box-sizing: border-box;
    overflow-x: hidden;
  }
  .settings-panel.open { display: flex; }
  .field-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 220px;
  }
  .field-group label {
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }
  .field-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .field-group input:focus {
    outline: none;
    border-color: var(--gold-dim);
  }
  .save-btn {
    background: var(--gold);
    color: #1a1200;
    border: none;
    padding: 8px 20px;
    border-radius: 6px;
    font-weight: 700;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    align-self: flex-end;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .save-btn:hover { background: var(--gold-light); }

  /* ── Main Layout ── */
  .main {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    height: calc(100vh - 57px);
  }

  @media (max-width: 768px) {
    .main {
      height: auto;
      min-height: 100vh;
    }
  }

  /* ── Left: Product List ── */
  .product-area {
    padding: 20px 24px;
    overflow-y: auto;
    border-right: 1px solid var(--border);
  }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .cat-filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .cat-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 5px 12px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .cat-btn:hover { border-color: var(--gold-dim); color: var(--gold); }
  .cat-btn.active {
    background: var(--gold-dim);
    border-color: var(--gold);
    color: var(--gold-light);
    font-weight: 700;
  }
  .toolbar-right {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .sel-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 4px 10px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.15s;
  }
  .sel-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .count-badge {
    font-size: 12px;
    color: var(--text-dim);
  }

  .search-bar {
    margin-bottom: 14px;
  }
  .search-bar input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
  }
  .search-bar input:focus { outline: none; border-color: var(--gold-dim); }
  .search-bar input::placeholder { color: var(--text-dim); }

  .product-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
    gap: 8px;
    width: 100%;
  }
  .product-card {
    min-width: 0;
    max-width: 100%;
    overflow: hidden;
  }

  @media (max-width: 600px) {
    .product-grid {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 8px;
    }
    .card-img-wrap { height: auto !important; aspect-ratio: 1/1; }
    .product-card { padding: 8px !important; }
    .card-name { font-size: 11px !important; -webkit-line-clamp: 2; }
    .card-sizes { font-size: 10px !important; }
    .card-price { font-size: 12px !important; }
    .card-cat { display: inline-block !important; font-size: 8px !important; padding: 1px 4px !important; }
    .card-code { font-size: 9px !important; }
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    user-select: none;
    min-width: 0;
    overflow: hidden;
  }
  .product-card:hover {
    border-color: var(--gold-dim);
    background: var(--surface2);
  }
  .product-card.selected {
    border-color: var(--gold);
    background: #1e1418;
  }
  .card-check {
    width: 18px;
    height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .product-card.selected .card-check {
    background: var(--gold);
    border-color: var(--gold);
  }
  .check-mark {
    width: 9px;
    height: 6px;
    border-left: 2px solid #1a0e0e;
    border-bottom: 2px solid #1a0e0e;
    transform: rotate(-45deg) translateY(-1px);
    display: none;
  }
  .product-card.selected .check-mark { display: block; }

  .card-img-wrap {
    width: 100%;
    aspect-ratio: 1/1;
    background: var(--surface2);
    border-radius: 6px;
    margin-bottom: 8px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    border: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }
  .card-img-wrap img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
  }
  .card-code { font-size: 10px; color: var(--text-dim); margin-bottom: 2px; }
  .card-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-price { font-size: 13px; font-weight: 700; color: var(--gold); }
  .card-cat {
    font-size: 9px;
    background: var(--surface2);
    color: var(--text-dim);
    padding: 2px 5px;
    border-radius: 4px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .card-sizes {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── Right: Send Panel ── */
  .send-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow-y: auto;
  }

  .panel-section {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
  }
  .panel-title {
    font-size: 11px;
    color: var(--gold-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
    font-weight: 700;
  }

  .selected-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 18px;
  }
  .selected-empty {
    color: var(--text-dim);
    font-size: 13px;
    text-align: center;
    padding: 20px 0;
  }
  .selected-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .selected-item:last-child { border-bottom: none; }
  .selected-item-name {
    font-size: 12px;
    color: var(--text);
    flex: 1;
    min-width: 0;
  }
  .selected-item-code {
    font-size: 10px;
    color: var(--text-dim);
  }
  .selected-item-price {
    font-size: 12px;
    color: var(--gold);
    font-weight: 700;
    white-space: nowrap;
  }
  .remove-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .remove-btn:hover { color: var(--red); }

  .mode-row {
    display: flex;
    gap: 8px;
  }
  .mode-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 7px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    text-align: center;
    transition: all 0.15s;
  }
  .mode-btn.active {
    background: #1e1418;
    border-color: var(--gold);
    color: var(--gold-light);
    font-weight: 700;
  }

  .note-wrap { margin-top: 10px; }
  .note-wrap textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
    resize: none;
    height: 70px;
    transition: border-color 0.15s;
  }
  .note-wrap textarea:focus { outline: none; border-color: var(--gold-dim); }
  .note-wrap textarea::placeholder { color: var(--text-dim); }

  .send-actions {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .send-count-text {
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
  }
  .send-count-text span { color: var(--gold); font-weight: 700; }

  .send-btn {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), var(--gold-dim));
    color: #1a1200;
    border: none;
    padding: 13px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .send-btn:hover { filter: brightness(1.1); }
  .send-btn:disabled {
    background: var(--surface2);
    color: var(--text-dim);
    cursor: not-allowed;
    filter: none;
  }
  .send-btn:active:not(:disabled) { transform: scale(0.98); }

  .copy-btn {
    width: 100%;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 9px;
    border-radius: 8px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-msg {
    font-size: 12px;
    text-align: center;
    min-height: 18px;
    color: var(--green);
  }
  .result-msg.error { color: var(--red); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    /* 整體佈局 */
    .main {
      display: flex;
      flex-direction: column;
      height: auto;
    }
    .product-area {
      border-right: none;
      padding: 10px;
      padding-bottom: 260px; /* 留給底部發送區 */
      overflow-y: auto;
      height: auto;
    }

    /* Header */
    .header { padding: 10px 12px; }
    .logo-icon { width: 26px; height: 26px; font-size: 13px; }
    .logo-text { font-size: 13px; }
    .logo-sub { display: none; }
    .settings-btn { font-size: 11px; padding: 5px 10px; }

    /* 設定面板 */
    .settings-panel { flex-direction: column !important; padding: 12px !important; gap: 10px !important; width: 100% !important; max-width: 100vw !important; overflow-x: hidden !important; }
    .field-group { min-width: unset !important; width: 100% !important; max-width: 100% !important; }
    .field-group input { width: 100% !important; min-width: unset !important; max-width: 100% !important; box-sizing: border-box !important; }
    .save-btn { width: 100% !important; }

    /* 篩選列 */
    .toolbar { flex-direction: column; align-items: flex-start; gap: 6px; }
    .cat-filters { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; -webkit-overflow-scrolling: touch; }
    .cat-btn { white-space: nowrap; flex-shrink: 0; font-size: 11px; padding: 4px 10px; }
    .toolbar-right { width: 100%; display: flex; justify-content: flex-end; align-items: center; gap: 8px; }
    .sel-btn { font-size: 11px; padding: 3px 8px; }
    .count-badge { font-size: 11px; }
    .search-bar input { font-size: 13px; padding: 8px 12px; }

    /* 商品格線：2欄，圖片1:1縮小版 */
    .product-grid {
      grid-template-columns: repeat(2, 1fr) !important;
      gap: 6px;
      width: 100%;
    }
    .product-card { padding: 6px; min-width: 0; max-width: 100%; overflow: hidden; }
    .card-check { width: 14px; height: 14px; margin-bottom: 4px; }
    .card-img-wrap { border-radius: 5px; }
    .card-code { font-size: 9px; }
    .card-name { font-size: 11px !important; -webkit-line-clamp: 2; margin-bottom: 3px; }
    .card-sizes { font-size: 10px !important; }
    .card-price { font-size: 12px !important; }
    .card-cat { display: inline-block !important; font-size: 8px !important; padding: 1px 4px !important; }
    .card-bottom { margin-top: 3px; }

    /* 發送區塊：固定在底部 */
    .send-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 55vh;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 200;
      display: flex;
      flex-direction: column;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .send-actions {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    /* 折疊標題列超緊湊 */
    .send-panel .panel-section { padding: 0; }
    .send-panel [onclick] { padding: 7px 14px !important; }
    .panel-title { font-size: 10px; margin-bottom: 0; }
    .mode-btn { font-size: 11px; padding: 6px 4px; }

    /* 手機版：隱藏已選清單和所有折疊區 */
    .selected-list { display: none; }
    .send-panel .panel-section { display: none; }
    .note-wrap { margin-top: 0; }
    .note-wrap textarea { height: 46px; font-size: 12px; }

    .send-actions { padding: 6px 12px 10px; gap: 5px; }
    .send-count-text { font-size: 11px; }
    .send-btn { padding: 10px; font-size: 13px; }
    .copy-btn { padding: 7px; font-size: 11px; }
    .result-msg { font-size: 11px; }
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">👗</div>
    <div>
      <div class="logo-text">哈摟米米</div>
      <div class="logo-sub">LINE 發送控制台</div>
    </div>
  </div>
  <div class="header-right">
    <button class="settings-btn" onclick="toggleSettings()">⚙ 設定</button>
  </div>
</div>

<!-- Settings Panel -->
<div class="settings-panel" id="settingsPanel">
  <div class="field-group">
    <label>Channel Access Token</label>
    <input type="password" id="lineToken" placeholder="貼上 LINE Token..." />
  </div>
  <div class="field-group" style="width:100%;min-width:200px;">
    <label>發送群組</label>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:8px;">
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="grp1" value="Cd367658234cec557814382501a96697a" style="width:20px;height:20px;cursor:pointer;flex-shrink:0;accent-color:#c9847a;" checked>
        <span style="font-size:14px;color:#f0ead8;font-weight:500;">Olie Baby</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <input type="checkbox" id="grp2" value="C2e26b43bcee40547ac97a5da14071365" style="width:20px;height:20px;cursor:pointer;flex-shrink:0;accent-color:#c9847a;" checked>
        <span style="font-size:14px;color:#f0ead8;font-weight:500;">cutie 的服裝小舖</span>
      </div>
    </div>
  </div>
  <div class="field-group" style="max-width:200px;">
    <label>Google Sheet ID（選填）</label>
    <input type="text" id="sheetId" placeholder="試算表 ID..." />
  </div>
  <button class="save-btn" onclick="saveSettings()">儲存設定</button>
</div>

<!-- Main -->
<!-- 圖片預覽 Modal -->
<div id="imgModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:999;overflow-y:auto;padding:20px;box-sizing:border-box;">
  <div style="max-width:480px;margin:0 auto;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="color:#fff;font-size:14px;font-weight:700;">📷 商品卡片預覽</span>
      <button onclick="document.getElementById('imgModal').style.display='none'" style="background:none;border:none;color:#fff;font-size:20px;cursor:pointer;">✕</button>
    </div>
    <canvas id="cardCanvas" style="display:none;"></canvas>
    <img id="cardImg" style="width:100%;border-radius:12px;display:block;" alt="商品卡片">
    <button id="downloadBtn" onclick="downloadCardImage()" style="width:100%;margin-top:12px;background:linear-gradient(135deg,#c9847a,#7a4a45);color:#fff;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;">⬇️ 下載圖片（電腦用）</button>
    <div style="color:#888;font-size:11px;text-align:center;margin-top:8px;">📱 手機：長按圖片 → 儲存圖片<br>💻 電腦：按下載按鈕</div>
  </div>
</div>

<div class="main">

  <!-- Left: Products -->
  <div class="product-area">
    <div class="toolbar">
      <div class="cat-filters" id="catFilters"></div>
      <div class="toolbar-right">
        <button class="sel-btn" onclick="selectAll()">全選</button>
        <button class="sel-btn" onclick="clearAll()">清除</button>
        <span class="count-badge" id="totalCount"></span>
      </div>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜尋商品名稱或編號..." oninput="renderGrid()" />
    </div>
    <div class="product-grid" id="productGrid"></div>
  </div>

  <!-- Right: Send Panel -->
  <div class="send-panel">

    <div class="panel-section" style="padding-bottom:8px;">
      <div class="panel-title">已選商品</div>
    </div>
    <div class="selected-list" id="selectedList">
      <div class="selected-empty">尚未選取商品</div>

    <div class="send-actions">

      <!-- 複製文字 + 產生圖片 同一排 -->
      <div style="display:flex;gap:6px;">
        <button class="copy-btn" id="copyBtn" onclick="handleCopy()" disabled style="flex:1;">📋 複製文字</button>

          <input type="text" id="scheduleLabel" placeholder="備註（選填）" style="flex:2;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 6px;color:var(--text);font-size:11px;font-family:inherit;">
          <button onclick="addSchedule()" style="background:var(--gold);color:#1a0e0e;border:none;border-radius:6px;padding:5px 8px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;">⏰</button>

      <div class="result-msg" id="resultMsg"></div>
    </div>

    <!-- 折疊設定區（最下面） -->
    <div class="panel-section" style="padding:0;">
      <div onclick="toggleAccordion('modeBody')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 18px;cursor:pointer;">
        <div class="panel-title" style="margin:0;">發送模式</div>
        <span id="modeArrow" style="font-size:10px;color:var(--text-dim);transition:transform 0.2s;">▼</span>
      </div>
      <div id="modeBody" style="display:none;padding:0 18px 12px;">
        <div class="mode-row">
          <button class="mode-btn active" id="modeCarousel" onclick="setMode('carousel')">Carousel 卡片</button>
          <button class="mode-btn" id="modeSingle" onclick="setMode('single')">純文字</button>
        </div>
      </div>
    </div>

    <div class="panel-section" style="padding:0;">
      <div onclick="toggleAccordion('colorBody')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 18px;cursor:pointer;">
        <div class="panel-title" style="margin:0;">顏色設定</div>
        <span id="colorArrow" style="font-size:10px;color:var(--text-dim);transition:transform 0.2s;">▼</span>
      </div>
      <div id="colorBody" style="display:none;padding:0 18px 12px;">
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:12px;color:var(--text-muted);">按鈕顏色</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <input type="color" id="btnColor" value="#c9847a" style="width:36px;height:28px;border:none;border-radius:4px;cursor:pointer;background:none;padding:0;">
              <span id="btnColorText" style="font-size:11px;color:var(--text-dim);">#c9847a</span>
            </div>
          </div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:12px;color:var(--text-muted);">價錢顏色</span>
            <div style="display:flex;align-items:center;gap:8px;">
              <input type="color" id="priceColor" value="#c9847a" style="width:36px;height:28px;border:none;border-radius:4px;cursor:pointer;background:none;padding:0;">
              <span id="priceColorText" style="font-size:11px;color:var(--text-dim);">#c9847a</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel-section" style="padding:0;">
      <div onclick="toggleAccordion('noteBody')" style="display:flex;align-items:center;justify-content:space-between;padding:10px 18px;cursor:pointer;">
        <div class="panel-title" style="margin:0;">附加說明</div>
        <span id="noteArrow" style="font-size:10px;color:var(--text-dim);transition:transform 0.2s;">▼</span>
      </div>
      <div id="noteBody" style="display:none;padding:0 18px 12px;">
        <div class="note-wrap" style="margin-top:0;">
          <textarea id="noteInput" placeholder="例：本週新品上架！數量有限，喜歡請把握 🛍"></textarea>
        </div>
      </div>

  </div>

</div>

<script>
// ── Data ──
let PRODUCTS = [];

// Google Sheets 設定
const SHEET_CONFIGS = [
  { id: '1AKt-FH2EgFnHqIbdaNFM4uzBnL1J-nw1Kks_aC_PUiE', sheets: ['C0000','H0001','E0000-2025'] },
  { id: '1I6rcLTilZju1VdheCoT1tDHmEngewbHXk0WZeLOoUJY', sheets: ['K0001','A0001-2025','D0001-2025','P0001'] },
];

// 欄位對應（A=0, B=1... AD=29）
const COL = { cat:0, barcode:1, name:4, sizes:5, price:13, text:14, imageUrl:29 };

async function loadProducts() {
  document.getElementById('productGrid').innerHTML = '<div style="padding:20px;color:var(--text-muted);">載入商品中...</div>';
  const allProducts = [];

  for (const config of SHEET_CONFIGS) {
    for (const sheetName of config.sheets) {
      try {
        const url = `https://docs.google.com/spreadsheets/d/${config.id}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
        const rows = json.table.rows;

        for (const row of rows) {
          const getVal = (i) => row.c && row.c[i] && row.c[i].v != null ? String(row.c[i].v).trim() : '';
          const barcode = getVal(COL.barcode);
          const name = getVal(COL.name);
          if (!barcode || !name || barcode === '條碼') continue;

          const priceRaw = getVal(COL.price);
          const price = priceRaw ? (priceRaw.startsWith('$') ? priceRaw : `$${priceRaw}`) : '';

          allProducts.push({
            code: barcode,
            name: name,
            price: price,
            sizes: getVal(COL.sizes),
            cat: getVal(COL.cat) || sheetName,
            catDisplay: (getVal(COL.cat) || sheetName).replace(/-\d+$/, ''),
            imageUrl: getVal(COL.imageUrl),
            text: getVal(COL.text),
            sheet: sheetName,
          });
        }
      } catch(e) {
        console.warn(`載入 ${sheetName} 失敗:`, e.message);
      }
    }
  }

  PRODUCTS = allProducts;
  renderCats();
  renderGrid();
  renderSelectedList();
  document.getElementById('totalCount').textContent = `${PRODUCTS.length} 件`;

  // 自動勾選 URL 帶來的商品（排程提醒用）
  const urlParams = new URLSearchParams(window.location.search);
  const codesParam = urlParams.get('codes');
  if (codesParam) {
    const codesToSelect = codesParam.split(',').map(c => c.trim()).filter(Boolean);
    codesToSelect.forEach(code => {
      if (PRODUCTS.find(p => p.code === code)) selected.add(code);
    });
    renderGrid();
    renderSelectedList();
    if (codesToSelect.length > 0) showResult(`✓ 已自動選取 ${selected.size} 件排程商品`, false);
  }
}

let selected = new Set();
let currentMode = 'carousel';
let currentCat = '全部';

// ── Settings ──
function loadSettings() {
  document.getElementById('lineToken').value = localStorage.getItem('lineToken') || '';

  document.getElementById('sheetId').value = localStorage.getItem('sheetId') || '';
}
function saveSettings() {
  localStorage.setItem('lineToken', document.getElementById('lineToken').value.trim());

  localStorage.setItem('sheetId', document.getElementById('sheetId').value.trim());
  showResult('✓ 設定已儲存', false);
  document.getElementById('settingsPanel').classList.remove('open');
}
function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
}

// ── Render ──
function getCats() {
  return ['全部', ...new Set(PRODUCTS.map(p => p.catDisplay))];
}
function renderCats() {
  const el = document.getElementById('catFilters');
  el.innerHTML = getCats().map(c =>
    `<button class="cat-btn ${c===currentCat?'active':''}" onclick="filterCat('${c}')">${c}</button>`
  ).join('');
}
function filterCat(cat) {
  currentCat = cat;
  renderCats();
  renderGrid();
}
function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return PRODUCTS.filter(p => {
    const matchCat = currentCat === '全部' || p.catDisplay === currentCat;
    const matchQ = !q || p.name.toLowerCase().includes(q) || p.code.toLowerCase().includes(q);
    return matchCat && matchQ;
  });
}
function renderGrid() {
  const filtered = getFiltered();
  document.getElementById('totalCount').textContent = `${filtered.length} 件`;
  document.getElementById('productGrid').innerHTML = filtered.map(p => `
    <div class="product-card ${selected.has(p.code)?'selected':''}" onclick="toggleCard('${p.code}')">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <div class="card-check"><div class="check-mark"></div></div>
        <span class="card-code">${p.code}</span>
      </div>
      <div class="card-img-wrap">
        ${p.imageUrl ? `<img src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none'">` : '👗'}
      </div>
      <div class="card-name">${p.name}</div>
      <div class="card-sizes">${p.sizes}</div>
      <div class="card-bottom">
        <span class="card-price">${p.price}</span>
        <span class="card-cat">${p.cat}</span>
      </div>
    </div>
  `).join('');
}
function renderSelectedList() {
  const items = PRODUCTS.filter(p => selected.has(p.code));
  const el = document.getElementById('selectedList');
  if (items.length === 0) {
    el.innerHTML = '<div class="selected-empty">尚未選取商品</div>';
  } else {
    el.innerHTML = items.map(p => `
      <div class="selected-item">
        <div style="flex:1;min-width:0;">
          <div class="selected-item-code">${p.code}</div>
          <div class="selected-item-name">${p.name}</div>
        </div>
        <span class="selected-item-price">${p.price}</span>
        <button class="remove-btn" onclick="removeItem('${p.code}')">✕</button>
      </div>
    `).join('');
  }
  const n = selected.size;
  document.getElementById('sendCountText').innerHTML = n === 0
    ? '尚未選取商品'
    : `已選取 <span>${n} 件</span>商品`;
  document.getElementById('sendBtn').disabled = n === 0;
  document.getElementById('liffShareBtn').disabled = n === 0;
  document.getElementById('copyBtn').disabled = n === 0;
  document.getElementById('imgBtn').disabled = n === 0;
}

// ── Interactions ──
function toggleCard(code) {
  if (selected.has(code)) selected.delete(code);
  else selected.add(code);
  renderGrid();
  renderSelectedList();
}
function removeItem(code) {
  selected.delete(code);
  renderGrid();
  renderSelectedList();
}
function selectAll() {
  getFiltered().forEach(p => selected.add(p.code));
  renderGrid();
  renderSelectedList();
}
function clearAll() {
  selected.clear();
  renderGrid();
  renderSelectedList();
}
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeCarousel').classList.toggle('active', mode==='carousel');
  document.getElementById('modeSingle').classList.toggle('active', mode==='single');
}

// ── Copy ──
function buildText() {
  const items = PRODUCTS.filter(p => selected.has(p.code));
  const note = document.getElementById('noteInput').value.trim();
  let text = '';
  if (note) text += `${note}\n\n`;
  items.forEach((p, idx) => {
    if (idx > 0) text += '\n\n';
    text += `#現貨 #可當日出貨\n`;
    const shortCode = (p.code || '').slice(0, 5);
    text += `☑️ ${p.name} - ${shortCode}\n`;
    if (p.sizes) {
      text += `⬇️ 現貨可喊尺寸⬇️\n`;
      // 按「顏色:」分行，例如「黑:5、7」「灰:9、11」
      const parts = p.sizes.split(/(?=[\u4e00-\u9fa5A-Za-z]+:)/);
      parts.forEach(s => {
        const trimmed = s.trim();
        if (trimmed) text += `${trimmed}\n`;
      });
    }
    if (p.price) text += `💰 售價：${p.price}\n`;
    text += `🛒 立即訂購：https://mimi-sender.zeabur.app/order.html?code=${encodeURIComponent(p.code||'')}`;
  });
  text += `\n\n${'─'.repeat(20)}\n`;
  text += `📩 私訊闆娘：LINE ID chami_1031\n`;
  text += `🏪 官方帳號：@hellomimi`;
  return text;
}
function handleCopy() {
  const text = buildText();
  navigator.clipboard.writeText(text).then(() => {
    showResult('✓ 已複製！貼到社群聊天室即可', false);
  }).catch(() => {
    showResult('✗ 複製失敗，請手動複製', true);
  });
}

// ── Send ──
function buildFlexCarousel(items, note) {
  const btnColorVal = document.getElementById('btnColor') ? document.getElementById('btnColor').value : '#c9847a';
  const priceColorVal = document.getElementById('priceColor') ? document.getElementById('priceColor').value : '#c9847a';
  const today = new Date().toLocaleDateString('zh-TW', { month:'numeric', day:'numeric' });

  const bubbles = items.map(p => {
    const validImg = p.imageUrl && typeof p.imageUrl === 'string' && p.imageUrl.startsWith('https://lh3.googleusercontent.com');
    const priceText = p.price ? String(p.price) : '洽詢';
    const sizesText = p.sizes ? `尺寸：${String(p.sizes)}` : '尺寸：洽詢';
    const codeText = p.code ? String(p.code) : '-';
    const nameText = p.name ? String(p.name) : '商品';
    const bubble = {
      type: 'bubble',
      size: 'kilo',
      body: {
        type: 'box',
        layout: 'vertical',
        spacing: 'sm',
        paddingAll: '14px',
        contents: [
          { type: 'text', text: codeText, size: 'xs', color: '#888888' },
          { type: 'text', text: nameText, weight: 'bold', size: 'sm', wrap: true, color: '#333333' },
          { type: 'text', text: priceText, size: 'lg', weight: 'bold', color: priceColorVal },
          { type: 'text', text: sizesText, size: 'xs', color: '#888888', wrap: true }
        ]
      },
      footer: {
        type: 'box',
        layout: 'vertical',
        spacing: 'sm',
        contents: [
          {
            type: 'text',
            text: '截圖給闆娘 高小攸 也可以 😊',
            size: 'xs',
            color: '#888888',
            align: 'center',
            wrap: true
          },
          {
            type: 'button',
            action: {
              type: 'uri',
              label: '我要訂購',
              uri: `https://mimi-sender.zeabur.app/order.html?code=${encodeURIComponent(p.code||'')}&name=${encodeURIComponent(p.name||'')}&price=${encodeURIComponent(p.price||'')}&sizes=${encodeURIComponent(p.sizes||'')}&img=${encodeURIComponent(p.imageUrl||'')}&cat=${encodeURIComponent(p.cat||'')}`
            },
            style: 'primary',
            color: btnColorVal,
            height: 'sm'
          }
        ]
      }
    };
    if (validImg) {
      bubble.hero = {
        type: 'image',
        url: p.imageUrl,
        size: 'full',
        aspectRatio: '1:1',
        aspectMode: 'cover'
      };
    }
    return bubble;
  });

  // note 加到 altText，不用獨立 bubble 避免格式錯誤
  const altText = note
    ? `🛍 ${today} 新品上架｜${note.replace(/[\n\r]/g,' ').slice(0,50)}`
    : `🛍 ${today} 新品上架 ${items.length} 件商品`;

  return {
    type: 'flex',
    altText: altText,
    contents: { type: 'carousel', contents: bubbles }
  };
}

async function handleSend() {
  const token = localStorage.getItem('lineToken');
  // 讀取勾選的群組
  const groupIds = [];
  document.querySelectorAll('#grp1, #grp2').forEach(cb => {
    if (cb.checked) groupIds.push(cb.value);
  });
  if (!token) {
    showResult('✗ 請先在設定填入 LINE Token', true);
    document.getElementById('settingsPanel').classList.add('open');
    return;
  }
  const items = PRODUCTS.filter(p => selected.has(p.code));
  const note = document.getElementById('noteInput').value.trim();
  showResult('發送中...', false);
  document.getElementById('sendBtn').disabled = true;

  try {
    let msg;
    if (currentMode === 'carousel') {
      msg = buildFlexCarousel(items, note);
    } else {
      msg = { type: 'text', text: buildText() };
    }

    if (groupIds.length === 0) {
      // Broadcast
      const res = await fetch('/api/line/broadcast', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, messages: [msg] })
      });
      if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.message || `HTTP ${res.status}`); }
    } else {
      // Push to each group
      const results = await Promise.all(groupIds.map(gid =>
        fetch('/api/line/push', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, groupId: gid, messages: [msg] })
        }).then(async res => {
          if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(`群組 ${gid.slice(0,8)}... 失敗：${err.message||res.status}`); }
          return true;
        })
      ));
    }
    showResult(`✓ 發送成功！${items.length} 件商品已推送到 ${groupIds.length || '所有好友'}`, false);
  } catch(e) {
    showResult(`✗ ${e.message}`, true);
  } finally {
    document.getElementById('sendBtn').disabled = selected.size === 0;
    document.getElementById('liffShareBtn').disabled = selected.size === 0;
  }
}

// ── 產生商品卡圖片 ─────────────────────────────────
async function handleGenerateImage() {
  const items = PRODUCTS.filter(p => selected.has(p.code));
  if (items.length === 0) { showResult('✗ 請先選取商品', true); return; }

  showResult('產生圖片中...', false);
  document.getElementById('imgBtn').disabled = true;

  // 建立畫布（強制高解析度）
  const dpr = Math.max(window.devicePixelRatio || 1, 3);
  const cols = Math.min(items.length, 2);
  const cardW = 320;
  const cardH = 480;
  const gap = 12;
  const padX = 20;
  const padY = 20;
  const rows = Math.ceil(items.length / cols);
  const canvasW = cols * cardW + (cols - 1) * gap + padX * 2;
  const canvasH = rows * cardH + (rows - 1) * gap + padY * 2;

  const canvas = document.getElementById('cardCanvas');
  canvas.width = canvasW * dpr;
  canvas.height = canvasH * dpr;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // 背景
  ctx.fillStyle = '#0f0d0e';
  ctx.fillRect(0, 0, canvasW, canvasH);

  // 畫每張卡片
  for (let i = 0; i < items.length; i++) {
    const p = items[i];
    const col = i % cols;
    const row = Math.floor(i / cols);
    const x = padX + col * (cardW + gap);
    const y = padY + row * (cardH + gap);

    // 卡片背景
    ctx.fillStyle = '#1a1618';
    roundRect(ctx, x, y, cardW, cardH, 12);
    ctx.fill();

    // 邊框
    ctx.strokeStyle = '#322830';
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, cardW, cardH, 12);
    ctx.stroke();

    // 圖片（保持比例，置中裁切）
    if (p.imageUrl) {
      try {
        const img = await loadImage(p.imageUrl);
        const imgAreaW = cardW - 24;
        const imgAreaH = 360;
        const imgX = x + 12;
        const imgY = y + 12;

        // 計算 cover 裁切
        const imgRatio = img.width / img.height;
        const areaRatio = imgAreaW / imgAreaH;
        let sx, sy, sw, sh;
        if (imgRatio > areaRatio) {
          sh = img.height;
          sw = sh * areaRatio;
          sx = (img.width - sw) / 2;
          sy = 0;
        } else {
          sw = img.width;
          sh = sw / areaRatio;
          sx = 0;
          sy = (img.height - sh) / 2;
        }

        ctx.save();
        roundRect(ctx, imgX, imgY, imgAreaW, imgAreaH, 8);
        ctx.clip();
        ctx.drawImage(img, sx, sy, sw, sh, imgX, imgY, imgAreaW, imgAreaH);
        ctx.restore();
      } catch(e) {
        ctx.fillStyle = '#231e21';
        ctx.fillRect(x + 12, y + 12, cardW - 24, 360);
        ctx.fillStyle = '#555';
        ctx.font = '40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('👗', x + cardW / 2, y + 190);
      }
    }

    const textY = y + 12 + 360 + 8;
    // 貨號
    ctx.fillStyle = '#664';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(p.code || '', x + 12, textY + 14);
    // 商品名
    ctx.fillStyle = '#f0e8e8';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(truncate(p.name, 20), x + 12, textY + 32);
    // 尺寸
    ctx.fillStyle = '#997';
    ctx.font = '11px sans-serif';
    ctx.fillText(truncate(`尺寸：${p.sizes}`, 28), x + 12, textY + 50);
    // 價格
    ctx.fillStyle = '#c9847a';
    ctx.font = 'bold 16px sans-serif';
    ctx.fillText(p.price || '洽詢', x + 12, textY + 70);
  }

  // 輸出到 img 標籤（手機長按可儲存）
  const dataUrl = canvas.toDataURL('image/png');
  document.getElementById('cardImg').src = dataUrl;
  document.getElementById('imgModal').style.display = 'block';
  showResult('✓ 圖片產生完成！', false);
  document.getElementById('imgBtn').disabled = selected.size === 0;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    // 走代理解決 CORS
    const proxySrc = src.startsWith('https://lh3.googleusercontent.com')
      ? `/api/imgproxy?url=${encodeURIComponent(src)}`
      : src;
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = proxySrc;
    setTimeout(() => reject(new Error('timeout')), 8000);
  });
}

function truncate(str, max) {
  return str && str.length > max ? str.slice(0, max) + '...' : (str || '');
}

function downloadCardImage() {
  const canvas = document.getElementById('cardCanvas');
  const a = document.createElement('a');
  a.download = `米米商品卡_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.png`;
  a.href = canvas.toDataURL('image/png');
  a.click();
}

// ── 排程功能 ──────────────────────────────────────
async function addSchedule() {
  const time = document.getElementById('scheduleTime').value;
  const label = document.getElementById('scheduleLabel').value.trim();
  const items = PRODUCTS.filter(p => selected.has(p.code));
  if (!time) { showResult('✗ 請選擇提醒時間', true); return; }
  if (items.length === 0) { showResult('✗ 請先選取商品', true); return; }
  try {
    const res = await fetch('/api/schedule', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ time, label, items: items.map(p => ({ code: p.code, name: p.name })) })
    });
    if (!res.ok) throw new Error();
    showResult(`✓ 已排程 ${time} 提醒！`, false);
    document.getElementById('scheduleTime').value = '';
    document.getElementById('scheduleLabel').value = '';
    loadSchedules();
  } catch(e) { showResult('✗ 排程失敗', true); }
}

async function loadSchedules() {
  try {
    const res = await fetch('/api/schedule');
    const list = await res.json();
    const el = document.getElementById('scheduleList');
    if (list.length === 0) { el.innerHTML = ''; return; }
    el.innerHTML = list.map(s => `
      <div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:5px 8px;">
        <div>
          <span style="font-size:12px;color:var(--gold);font-weight:700;">⏰ ${s.time}</span>
          <span style="font-size:11px;color:var(--text-muted);margin-left:6px;">${s.label || ''}</span>
          <span style="font-size:10px;color:var(--text-dim);margin-left:4px;">${s.items.length}件</span>
        </div>
        <button onclick="deleteSchedule('${s.id}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;">✕</button>
      </div>
    `).join('');
  } catch(e) {}
}

async function deleteSchedule(id) {
  await fetch(`/api/schedule/${id}`, { method: 'DELETE' });
  loadSchedules();
}

function toggleAccordion(id) {
  const body = document.getElementById(id);
  const arrowMap = { colorBody: 'colorArrow', noteBody: 'noteArrow', modeBody: 'modeArrow' };
  const arrow = document.getElementById(arrowMap[id]);
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  if (arrow) arrow.style.transform = isOpen ? '' : 'rotate(180deg)';
}

// ── LIFF 分享功能 ──────────────────────────────────
const LIFF_ID = '1657385678-5T9F9nca';
let liffReady = false;

async function initLiff() {
  try {
    await liff.init({ liffId: LIFF_ID });
    liffReady = true;
  } catch(e) {
    console.warn('LIFF init failed:', e);
  }
}
initLiff();

async function handleLiffShare() {
  const items = PRODUCTS.filter(p => selected.has(p.code));
  if (items.length === 0) { showResult('✗ 請先選取商品', true); return; }

  if (!liffReady) {
    showResult('✗ LIFF 尚未初始化，請用 LINE 內建瀏覽器開啟此頁面', true);
    return;
  }
  if (!liff.isInClient()) {
    showResult('✗ 請用手機 LINE App 開啟此控制台，才能使用分享功能', true);
    return;
  }

  const note = document.getElementById('noteInput').value.trim();
  let msg;
  if (currentMode === 'carousel') {
    msg = buildFlexCarousel(items, note);
  } else {
    msg = { type: 'text', text: buildText() };
  }

  try {
    const result = await liff.shareTargetPicker([msg]);
    if (result) {
      showResult(`✓ 已分享 ${items.length} 件商品！`, false);
    } else {
      showResult('已取消分享', false);
    }
  } catch(e) {
    showResult(`✗ 分享失敗：${e.message}`, true);
  }
}

function showResult(msg, isError) {
  const el = document.getElementById('resultMsg');

  el.className = 'result-msg' + (isError ? ' error' : '');
}
